services:
  db:
    image: postgres:16-alpine
    container_name: eazyproperties-db

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: eazy_properties
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - eazyproperties_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eazy_properties"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: eazyproperties-app

    ports:
      - "3000:3000"

    env_file:
      - .env.docker

    depends_on:
      db:
        condition: service_healthy

    command: >
      sh -c "
      npx mikro-orm migration:up &&
      npx mikro-orm seeder:run &&
      npm run dev -- --hostname 0.0.0.0
      "

    restart: unless-stopped

volumes:
  eazyproperties_db_data: